workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.binghanem.letsmeet
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.binghanem.letsmeet"
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps
      - name: Build web app
        script: npm run build
      - name: Add iOS platform and sync
        script: |
          node node_modules/@capacitor/cli/bin/capacitor add ios || true
          node node_modules/@capacitor/cli/bin/capacitor sync ios
      - name: Generate app icon
        script: |
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const src = 'resources/icon.png';
            const dir = 'ios/App/App/Assets.xcassets/AppIcon.appiconset';
            fs.mkdirSync(dir, { recursive: true });
            const sizes = [
              ['Icon-20.png',20],['Icon-40.png',40],['Icon-29.png',29],
              ['Icon-58.png',58],['Icon-87.png',87],['Icon-60.png',60],
              ['Icon-76.png',76],['Icon-80.png',80],['Icon-120.png',120],
              ['Icon-152.png',152],['Icon-167.png',167],['Icon-180.png',180],
              ['Icon-1024.png',1024]
            ];
            sizes.forEach(([name,size]) => execSync('sips -z '+size+' '+size+' '+src+' --out '+dir+'/'+name));
            const contents = {
              images: [
                {size:'20x20',idiom:'iphone',filename:'Icon-20.png',scale:'1x'},
                {size:'20x20',idiom:'iphone',filename:'Icon-40.png',scale:'2x'},
                {size:'20x20',idiom:'iphone',filename:'Icon-60.png',scale:'3x'},
                {size:'29x29',idiom:'iphone',filename:'Icon-29.png',scale:'1x'},
                {size:'29x29',idiom:'iphone',filename:'Icon-58.png',scale:'2x'},
                {size:'29x29',idiom:'iphone',filename:'Icon-87.png',scale:'3x'},
                {size:'40x40',idiom:'iphone',filename:'Icon-40.png',scale:'1x'},
                {size:'40x40',idiom:'iphone',filename:'Icon-80.png',scale:'2x'},
                {size:'40x40',idiom:'iphone',filename:'Icon-120.png',scale:'3x'},
                {size:'60x60',idiom:'iphone',filename:'Icon-120.png',scale:'2x'},
                {size:'60x60',idiom:'iphone',filename:'Icon-180.png',scale:'3x'},
                {size:'20x20',idiom:'ipad',filename:'Icon-20.png',scale:'1x'},
                {size:'20x20',idiom:'ipad',filename:'Icon-40.png',scale:'2x'},
                {size:'29x29',idiom:'ipad',filename:'Icon-29.png',scale:'1x'},
                {size:'29x29',idiom:'ipad',filename:'Icon-58.png',scale:'2x'},
                {size:'40x40',idiom:'ipad',filename:'Icon-40.png',scale:'1x'},
                {size:'40x40',idiom:'ipad',filename:'Icon-80.png',scale:'2x'},
                {size:'76x76',idiom:'ipad',filename:'Icon-76.png',scale:'1x'},
                {size:'76x76',idiom:'ipad',filename:'Icon-152.png',scale:'2x'},
                {size:'83.5x83.5',idiom:'ipad',filename:'Icon-167.png',scale:'2x'},
                {size:'1024x1024',idiom:'ios-marketing',filename:'Icon-1024.png',scale:'1x'}
              ],
              info: {version:1,author:'xcode'}
            };
            fs.writeFileSync(dir+'/Contents.json', JSON.stringify(contents, null, 2));
            console.log('App icon generated successfully');
          "

      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Configure push notifications (entitlement + AppDelegate)
        script: |
          # 1. Write the entitlements file. Apple sign-in uses the WEB OAuth flow
          #    (Safari view, like Google) — NOT native ASAuthorization — so we do
          #    NOT ship the com.apple.developer.applesignin entitlement. The native
          #    path failed with error 1000 because the App ID's SIWA capability was
          #    never authorized in the signing profile; web OAuth needs no
          #    entitlement at all. The only entitlement we need is aps-environment
          #    (production APNs) for push notifications.
          cat > ios/App/App/App.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>aps-environment</key>
          <string>production</string>
          </dict>
          </plist>
          PLIST
          echo "=== Entitlements file ===" && cat ios/App/App/App.entitlements
          # HARD GATE: confirm push entitlement is present and SIWA is NOT (shipping
          # an unauthorized SIWA entitlement is exactly what caused error 1000).
          /usr/libexec/PlistBuddy -c 'Print :aps-environment' ios/App/App/App.entitlements | grep -q production \
            || { echo "FATAL: aps-environment entitlement missing — push would break"; exit 1; }
          if grep -q 'applesignin' ios/App/App/App.entitlements; then
            echo "FATAL: SIWA entitlement present — web OAuth needs none and it causes error 1000"; exit 1
          fi
          # 2. Point the App target at the entitlements file (xcodeproj gem)
          ruby scripts/add_entitlements.rb
          echo "=== Verify CODE_SIGN_ENTITLEMENTS ===" && grep "CODE_SIGN_ENTITLEMENTS" ios/App/App.xcodeproj/project.pbxproj || echo "MISSING — entitlement not set"
          # HARD GATE: never ship an iPad-capable binary again. TARGETED_DEVICE_FAMILY
          # must be 1 (iPhone only) in every build config. Apple rejected build #82
          # under Guideline 4 after reviewing on iPad — fail loudly if this regresses.
          echo "=== Verify TARGETED_DEVICE_FAMILY (must be 1, iPhone only) ==="
          # Fail on any iPad-capable value, quoted OR unquoted ("1,2", 1,2, "2", 2).
          if grep -Eq 'TARGETED_DEVICE_FAMILY = "?(1,2|2)"?;' ios/App/App.xcodeproj/project.pbxproj; then
            echo "FATAL: project still targets iPad (TARGETED_DEVICE_FAMILY != 1)"; exit 1
          fi
          # And positively confirm the iPhone-only value is actually present.
          if ! grep -Eq 'TARGETED_DEVICE_FAMILY = "?1"?;' ios/App/App.xcodeproj/project.pbxproj; then
            echo "FATAL: TARGETED_DEVICE_FAMILY=1 missing — add_entitlements.rb did not apply"; exit 1
          fi
          grep "TARGETED_DEVICE_FAMILY" ios/App/App.xcodeproj/project.pbxproj
          # 3. Forward APNs registration callbacks to the Capacitor plugin
          python3 scripts/patch_appdelegate.py
          echo "=== Verify AppDelegate methods ===" && grep -c "didRegisterForRemoteNotifications" ios/App/App/AppDelegate.swift || echo "0 — AppDelegate NOT patched"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))

      - name: Set export compliance, URL scheme, and privacy descriptions
        script: |
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist
          plutil -insert CFBundleURLTypes -json '[{"CFBundleURLSchemes":["letsmeet"]}]' ios/App/App/Info.plist 2>/dev/null || \
          plutil -replace CFBundleURLTypes -json '[{"CFBundleURLSchemes":["letsmeet"]}]' ios/App/App/Info.plist
          plutil -insert NSCameraUsageDescription -string "Let's Meet uses your camera to share photos in group chats." ios/App/App/Info.plist 2>/dev/null || \
          plutil -replace NSCameraUsageDescription -string "Let's Meet uses your camera to share photos in group chats." ios/App/App/Info.plist
          plutil -insert NSPhotoLibraryUsageDescription -string "Let's Meet accesses your photo library so you can share images in group chats." ios/App/App/Info.plist 2>/dev/null || \
          plutil -replace NSPhotoLibraryUsageDescription -string "Let's Meet accesses your photo library so you can share images in group chats." ios/App/App/Info.plist
          # NSPhotoLibraryAddUsageDescription is REQUIRED by the Capacitor Camera plugin
          # (it can write captured photos to the library). Without it the camera/gallery
          # in chat throws "missing NSPhotoLibraryAddUsageDescription" at runtime.
          plutil -insert NSPhotoLibraryAddUsageDescription -string "Let's Meet saves photos you capture to your photo library." ios/App/App/Info.plist 2>/dev/null || \
          plutil -replace NSPhotoLibraryAddUsageDescription -string "Let's Meet saves photos you capture to your photo library." ios/App/App/Info.plist
          plutil -insert NSLocationWhenInUseUsageDescription -string "Let's Meet uses your location to suggest nearby places when you create a plan." ios/App/App/Info.plist 2>/dev/null || \
          plutil -replace NSLocationWhenInUseUsageDescription -string "Let's Meet uses your location to suggest nearby places when you create a plan." ios/App/App/Info.plist


      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - binghanem@gmail.com
        notify:
          success: true
          failure: true
